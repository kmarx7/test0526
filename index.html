<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do 앱</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus { border-color: #6c63ff; }

    .input-row button {
      padding: 12px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.4rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-row button:hover { background: #574fd6; }
    .input-row button:active { transform: scale(0.95); }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-bar button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      color: #666;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-bar button.active {
      border-color: #6c63ff;
      background: #6c63ff;
      color: #fff;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: opacity 0.2s, transform 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done { opacity: 0.5; }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 1rem;
      color: #222;
      word-break: break-word;
      outline: none;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-text:focus {
      border-bottom: 1px dashed #6c63ff;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ff4757; background: #fff0f1; }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 0.95rem;
      padding: 40px 0;
    }

    .stats {
      margin-top: 20px;
      font-size: 0.82rem;
      color: #999;
      text-align: right;
    }

    .clear-done {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      border: 2px dashed #e0e0e0;
      border-radius: 10px;
      background: none;
      color: #aaa;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-done:hover { border-color: #ff4757; color: #ff4757; }
  </style>
</head>
<body>
  <div class="app">
    <h1>할 일 목록</h1>
    <p class="subtitle" id="date"></p>

    <div class="input-row">
      <input id="new-todo" type="text" placeholder="새로운 할 일을 입력하세요..." />
      <button id="add-btn" title="추가">+</button>
    </div>

    <div class="filter-bar">
      <button class="active" data-filter="all">전체</button>
      <button data-filter="active">진행 중</button>
      <button data-filter="done">완료</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>
    <p class="stats" id="stats"></p>
    <button class="clear-done" id="clear-done">완료된 항목 삭제</button>
  </div>

  <script>
    const KEY = 'todos_v1';
    let todos = JSON.parse(localStorage.getItem(KEY) || '[]');
    let filter = 'all';

    const listEl    = document.getElementById('todo-list');
    const input     = document.getElementById('new-todo');
    const statsEl   = document.getElementById('stats');
    const dateEl    = document.getElementById('date');

    // 날짜 표시
    dateEl.textContent = new Date().toLocaleDateString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });

    function save() {
      localStorage.setItem(KEY, JSON.stringify(todos));
    }

    function render() {
      const visible = todos.filter(t =>
        filter === 'all'    ? true :
        filter === 'active' ? !t.done :
                               t.done
      );

      listEl.innerHTML = '';

      if (visible.length === 0) {
        listEl.innerHTML = '<p class="empty">항목이 없습니다.</p>';
      } else {
        visible.forEach(todo => {
          const li = document.createElement('li');
          li.className = 'todo-item' + (todo.done ? ' done' : '');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = todo.done;
          cb.addEventListener('change', () => {
            todo.done = cb.checked;
            save(); render();
          });

          const span = document.createElement('span');
          span.className = 'todo-text';
          span.contentEditable = true;
          span.textContent = todo.text;
          span.addEventListener('blur', () => {
            const trimmed = span.textContent.trim();
            if (trimmed) { todo.text = trimmed; save(); }
            else { todos = todos.filter(t => t.id !== todo.id); save(); render(); }
          });
          span.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); span.blur(); }
          });

          const del = document.createElement('button');
          del.className = 'delete-btn';
          del.textContent = '×';
          del.title = '삭제';
          del.addEventListener('click', () => {
            todos = todos.filter(t => t.id !== todo.id);
            save(); render();
          });

          li.append(cb, span, del);
          listEl.appendChild(li);
        });
      }

      const total = todos.length;
      const done  = todos.filter(t => t.done).length;
      statsEl.textContent = total ? `${done} / ${total} 완료` : '';
    }

    document.getElementById('add-btn').addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save(); render();
    }

    document.querySelectorAll('.filter-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    document.getElementById('clear-done').addEventListener('click', () => {
      todos = todos.filter(t => !t.done);
      save(); render();
    });

    render();
  </script>
</body>
</html>
